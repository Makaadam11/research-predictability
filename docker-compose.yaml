services:
  backend:
    build: ./backend
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: ./frontend
      args:
       - API_HOST=backend
    env_file: .env
    restart: unless-stopped
    ports:
      - "80:3000"